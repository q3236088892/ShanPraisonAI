<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{TITLE}}</title>
<style>
/* ── Reset & Base ── */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg-primary: #000000;
  --bg-slide: #1a1a1a;
  --bg-gradient-start: #0a0a0a;
  --bg-gradient-end: #1a1a2e;
  --text-primary: #ffffff;
  --text-secondary: #a0a0a0;
  --text-muted: #666666;
  --accent: #0071e3;
  --accent-glow: rgba(0, 113, 227, 0.3);
  --font-display: -apple-system, "SF Pro Display", "Helvetica Neue", Arial, sans-serif;
  --font-body: -apple-system, "SF Pro Text", "Helvetica Neue", Arial, sans-serif;
  --slide-width: 1280px;
  --slide-height: 720px;
  --transition-speed: 0.6s;
}

html, body {
  width: 100%; height: 100%;
  background: var(--bg-primary);
  color: var(--text-primary);
  font-family: var(--font-body);
  overflow: hidden;
  -webkit-font-smoothing: antialiased;
}

/* ── Slide Container ── */
.deck {
  width: 100vw; height: 100vh;
  position: relative;
  overflow: hidden;
}

.slide {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  padding: 80px 120px;
  opacity: 0;
  transform: translateX(60px);
  transition: opacity var(--transition-speed) ease, transform var(--transition-speed) ease;
  pointer-events: none;
  background: linear-gradient(135deg, var(--bg-gradient-start), var(--bg-gradient-end));
}

.slide.active {
  opacity: 1;
  transform: translateX(0);
  pointer-events: auto;
}

.slide.prev {
  opacity: 0;
  transform: translateX(-60px);
}

/* ── Title Slide ── */
.slide.slide--title {
  text-align: center;
  background: radial-gradient(ellipse at 50% 50%, #111122 0%, #000000 70%);
}

.slide--title h1 {
  font-family: var(--font-display);
  font-size: 72px;
  font-weight: 700;
  letter-spacing: -0.02em;
  line-height: 1.1;
  margin-bottom: 24px;
  background: linear-gradient(135deg, #ffffff 0%, #a0c4ff 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.slide--title .subtitle {
  font-size: 28px;
  font-weight: 300;
  color: var(--text-secondary);
  letter-spacing: 0.02em;
}

/* ── Content Slide ── */
.slide--content {
  align-items: flex-start;
  text-align: left;
}

.slide--content h2 {
  font-family: var(--font-display);
  font-size: 48px;
  font-weight: 600;
  letter-spacing: -0.01em;
  margin-bottom: 48px;
  color: var(--text-primary);
}

.slide--content ul {
  list-style: none;
  width: 100%;
  max-width: 900px;
}

.slide--content li {
  font-size: 26px;
  font-weight: 300;
  line-height: 1.6;
  color: var(--text-secondary);
  padding: 12px 0;
  padding-left: 32px;
  position: relative;
  border-bottom: 1px solid rgba(255,255,255,0.04);
}

.slide--content li:last-child { border-bottom: none; }

.slide--content li::before {
  content: "";
  position: absolute;
  left: 0;
  top: 50%;
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--accent);
  transform: translateY(-50%);
  box-shadow: 0 0 12px var(--accent-glow);
}

/* ── Two Column Slide ── */
.slide--two-col {
  align-items: flex-start;
  text-align: left;
}

.slide--two-col h2 {
  font-family: var(--font-display);
  font-size: 48px;
  font-weight: 600;
  margin-bottom: 48px;
  width: 100%;
}

.columns {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 80px;
  width: 100%;
}

.column h3 {
  font-size: 22px;
  font-weight: 500;
  color: var(--accent);
  margin-bottom: 20px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
}

.column ul { list-style: none; }

.column li {
  font-size: 22px;
  font-weight: 300;
  line-height: 1.7;
  color: var(--text-secondary);
  padding: 8px 0;
  padding-left: 24px;
  position: relative;
}

.column li::before {
  content: "—";
  position: absolute;
  left: 0;
  color: var(--text-muted);
}

/* ── Quote Slide ── */
.slide--quote {
  text-align: center;
  background: radial-gradient(ellipse at 50% 50%, #0a0a20 0%, #000000 70%);
}

.slide--quote blockquote {
  font-family: var(--font-display);
  font-size: 42px;
  font-weight: 300;
  font-style: italic;
  line-height: 1.5;
  color: var(--text-primary);
  max-width: 800px;
  position: relative;
  padding: 0 40px;
}

.slide--quote blockquote::before {
  content: "\201C";
  font-size: 120px;
  position: absolute;
  top: -40px;
  left: -20px;
  color: var(--accent);
  opacity: 0.3;
  font-style: normal;
}

.slide--quote .attribution {
  margin-top: 32px;
  font-size: 20px;
  color: var(--text-muted);
  font-weight: 400;
}

/* ── End Slide ── */
.slide--end {
  text-align: center;
  background: radial-gradient(ellipse at 50% 50%, #0d0d2b 0%, #000000 70%);
}

.slide--end h1 {
  font-family: var(--font-display);
  font-size: 80px;
  font-weight: 700;
  background: linear-gradient(135deg, #ffffff 0%, #64b5f6 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.slide--end .subtitle {
  font-size: 24px;
  color: var(--text-muted);
  margin-top: 16px;
}

/* ── Progress Bar ── */
.progress {
  position: fixed;
  bottom: 0;
  left: 0;
  height: 3px;
  background: var(--accent);
  transition: width 0.4s ease;
  z-index: 100;
  box-shadow: 0 0 10px var(--accent-glow);
}

/* ── Slide Counter ── */
.counter {
  position: fixed;
  bottom: 20px;
  right: 32px;
  font-size: 14px;
  color: var(--text-muted);
  font-variant-numeric: tabular-nums;
  z-index: 100;
}

/* ── Keyboard Hint ── */
.hint {
  position: fixed;
  bottom: 20px;
  left: 32px;
  font-size: 12px;
  color: var(--text-muted);
  opacity: 0.5;
  z-index: 100;
}

/* ── Print / Export ── */
@media print {
  .slide {
    position: relative !important;
    opacity: 1 !important;
    transform: none !important;
    page-break-after: always;
    pointer-events: auto !important;
    width: var(--slide-width);
    height: var(--slide-height);
  }
  .progress, .counter, .hint { display: none; }
}
</style>
</head>
<body>

<div class="deck" id="deck">
{{SLIDES}}
</div>

<div class="progress" id="progress"></div>
<div class="counter" id="counter"></div>
<div class="hint">← → / Space / Click</div>

<script>
(function () {
  const slides = document.querySelectorAll('.slide');
  const total = slides.length;
  let current = 0;

  function goto(n) {
    if (n < 0 || n >= total) return;
    slides[current].classList.remove('active');
    slides[current].classList.add(n > current ? 'prev' : '');
    current = n;
    slides.forEach((s, i) => {
      s.classList.remove('active', 'prev');
      if (i === current) s.classList.add('active');
      else if (i < current) s.classList.add('prev');
    });
    document.getElementById('progress').style.width = ((current + 1) / total * 100) + '%';
    document.getElementById('counter').textContent = (current + 1) + ' / ' + total;
  }

  document.addEventListener('keydown', function (e) {
    if (e.key === 'ArrowRight' || e.key === ' ' || e.key === 'Enter') { e.preventDefault(); goto(current + 1); }
    else if (e.key === 'ArrowLeft' || e.key === 'Backspace') { e.preventDefault(); goto(current - 1); }
    else if (e.key === 'Home') { e.preventDefault(); goto(0); }
    else if (e.key === 'End') { e.preventDefault(); goto(total - 1); }
  });

  document.addEventListener('click', function (e) {
    if (e.clientX > window.innerWidth / 2) goto(current + 1);
    else goto(current - 1);
  });

  // Touch support
  let touchStartX = 0;
  document.addEventListener('touchstart', function (e) { touchStartX = e.changedTouches[0].screenX; });
  document.addEventListener('touchend', function (e) {
    const dx = e.changedTouches[0].screenX - touchStartX;
    if (Math.abs(dx) > 50) { dx < 0 ? goto(current + 1) : goto(current - 1); }
  });

  goto(0);
})();
</script>
</body>
</html>
